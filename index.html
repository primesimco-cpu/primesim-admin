<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>primesim Admin Panel — primesim.co</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Inter',sans-serif;background:#09090B;color:#FAFAFA;overflow-x:hidden}
button,input,select,textarea{font-family:inherit;color:inherit}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:9px}
:root{
  --g:#10B981;--g2:#059669;--gd:rgba(16,185,129,.12);--gb:rgba(16,185,129,.25);
  --bl:#3B82F6;--bd:rgba(59,130,246,.12);
  --am:#F59E0B;--ad:rgba(245,158,11,.12);
  --ro:#F43F5E;--rd:rgba(244,63,94,.12);
  --vi:#8B5CF6;--vd:rgba(139,92,246,.12);
  --s0:#09090B;--s1:#111113;--s2:#18181B;--s3:#27272A;--s4:#3F3F46;
  --t1:#FAFAFA;--t2:#A1A1AA;--t3:#71717A;--t4:#52525B;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.1);--b3:rgba(255,255,255,.18);
  --fn:'Syne',sans-serif;
}
/* LANG */
.t{display:none}
html[data-lang=tr] .t-tr,html[data-lang=en] .t-en,html[data-lang=de] .t-de,
html[data-lang=fr] .t-fr,html[data-lang=es] .t-es,html[data-lang=ar] .t-ar,
html[data-lang=zh] .t-zh,html[data-lang=ja] .t-ja,html[data-lang=ko] .t-ko,
html[data-lang=ru] .t-ru,html[data-lang=it] .t-it,html[data-lang=pt] .t-pt,
html[data-lang=nl] .t-nl,html[data-lang=pl] .t-pl,html[data-lang=sv] .t-sv,
html[data-lang=da] .t-da,html[data-lang=fi] .t-fi,html[data-lang=no] .t-no,
html[data-lang=th] .t-th,html[data-lang=id] .t-id{display:inline}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:var(--fn);font-weight:600;font-size:13px;padding:9px 18px;border-radius:16px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-g{background:var(--g);color:#052E1C}.btn-g:hover{background:var(--g2);transform:translateY(-1px);box-shadow:0 4px 18px rgba(16,185,129,.3)}
.btn-gl{background:rgba(255,255,255,.07);border:1px solid var(--b2);color:var(--t1)}.btn-gl:hover{background:rgba(255,255,255,.12)}
.btn-ou{background:transparent;border:1px solid var(--b2);color:var(--t2)}.btn-ou:hover{border-color:var(--b3);color:var(--t1)}
.btn-red{background:var(--rd);border:1px solid rgba(244,63,94,.2);color:#FB7185}.btn-red:hover{background:rgba(244,63,94,.2)}
.btn-amb{background:var(--ad);border:1px solid rgba(245,158,11,.2);color:#FCD34D}
.btn-sm{font-size:11px;padding:5px 12px;border-radius:10px}
.btn-xs{font-size:10px;padding:3px 8px;border-radius:8px}
.btn-lg{font-size:15px;padding:13px 26px}
.btn-fw{width:100%;padding:13px;justify-content:center}
/* TOAST */
#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:10px 14px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;animation:tIn .2s ease;pointer-events:all;box-shadow:0 8px 32px rgba(0,0,0,.5);border-left:3px solid var(--g)}
.toast.e{border-left-color:var(--ro)}.toast.w{border-left-color:var(--am)}
@keyframes tIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
/* MODAL */
#mwrap{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(12px);z-index:8000;display:none;align-items:center;justify-content:center;padding:16px}
#mwrap.on{display:flex}
#mbox{background:var(--s2);border:1px solid var(--b2);border-radius:22px;padding:24px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;position:relative;animation:mIn .2s ease;box-shadow:0 24px 64px rgba(0,0,0,.7)}
#mbox.lg{max-width:800px}
@keyframes mIn{from{transform:scale(.94) translateY(12px);opacity:0}to{transform:none;opacity:1}}
.mx{position:absolute;top:13px;right:13px;width:28px;height:28px;border-radius:50%;background:var(--s3);border:none;cursor:pointer;display:grid;place-items:center;font-size:13px;color:var(--t2)}
.mx:hover{background:var(--s4);color:var(--t1)}
#mbox h2{font-family:var(--fn);font-size:17px;font-weight:700;margin-bottom:16px}
/* FORM */
.f{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.f.fw{grid-column:1/-1}
.f label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)}
.f input,.f select,.f textarea{background:var(--s3);border:1px solid var(--b2);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--t1);outline:none;transition:border-color .13s;width:100%}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--g)}
.f select option{background:var(--s2)}
.f textarea{resize:vertical;min-height:70px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.fa{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--b1)}
/* TOGGLE */
.tog{width:34px;height:19px;border-radius:99px;position:relative;cursor:pointer;transition:background .18s;flex-shrink:0;border:none;background:var(--s4)}
.tog.on{background:var(--g)}.tog::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:white;transition:transform .18s}
.tog.on::after{transform:translateX(15px)}
/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:700;letter-spacing:.03em}
.bg{background:var(--gd);color:var(--g)}.bb{background:var(--bd);color:#93C5FD}
.ba{background:var(--ad);color:#FCD34D}.br{background:var(--rd);color:#FB7185}
.bv{background:var(--vd);color:#C4B5FD}.bx{background:rgba(255,255,255,.06);color:var(--t2)}
/* PLAN CARD */
.pc{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.pc:hover{border-color:var(--g);transform:translateY(-3px);box-shadow:0 8px 32px rgba(16,185,129,.12)}
.pc.ft{border-color:var(--gb)}.pc.ft::after{content:'TOP PICK';position:absolute;top:0;right:0;background:var(--g);color:#052E1C;font-size:8px;font-weight:800;padding:3px 9px;border-radius:0 16px 0 10px}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
/* TABLE */
.tw{background:var(--s1);border:1px solid var(--b1);border-radius:16px;overflow:hidden;margin-bottom:12px}
.th{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1);gap:8px;flex-wrap:wrap}
.tt{font-family:var(--fn);font-size:13px;font-weight:700}
.ts{background:var(--s3);border:1px solid var(--b2);border-radius:10px;padding:5px 10px;font-size:11px;outline:none;width:160px;transition:border-color .13s;color:var(--t1)}
.ts:focus{border-color:var(--g)}
.tf{background:var(--s3);border:1px solid var(--b2);border-radius:10px;padding:5px 10px;font-size:11px;color:var(--t2);outline:none;cursor:pointer}
table{width:100%;border-collapse:collapse}
thead th{padding:7px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);text-align:left;background:rgba(255,255,255,.02);border-bottom:1px solid var(--b1);white-space:nowrap}
tbody td{padding:9px 12px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.025);color:var(--t2);vertical-align:middle}
tbody tr:last-child td{border:none}
tbody tr:hover td{background:rgba(255,255,255,.015)}
.t1{color:var(--t1)!important;font-weight:600}.tm{font-family:monospace;font-size:9px!important;color:var(--t4)!important}
.ta{display:flex;gap:3px}
/* METRIC */
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.mc{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.mc.cg::before{background:var(--g)}.mc.cb::before{background:var(--bl)}.mc.cv::before{background:var(--vi)}.mc.ca::before{background:var(--am)}.mc.cr::before{background:var(--ro)}
.ml{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px}
.mv{font-family:var(--fn);font-size:24px;font-weight:800;color:var(--t1);line-height:1;margin-bottom:3px}
.ms{font-size:10px;color:var(--t3)}
/* ADMIN SB */
.asec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t4);padding:10px 13px 3px;white-space:nowrap}
.asb{display:flex;align-items:center;gap:7px;width:calc(100% - 10px);padding:7px 10px;border-radius:10px;margin:1px 5px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border:none;background:none;text-align:left;transition:all .13s;white-space:nowrap;overflow:hidden;font-family:inherit}
.asb:hover{background:var(--s3);color:var(--t1)}.asb.on{background:var(--gd);color:var(--g)}
.aic{font-size:14px;width:18px;text-align:center;flex-shrink:0}
/* ALERT */
.al{border-radius:10px;padding:9px 12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;font-size:12px}
.al-w{background:var(--ad);border:1px solid rgba(245,158,11,.2);color:#FCD34D}
.al-i{background:var(--bd);border:1px solid rgba(59,130,246,.2);color:#93C5FD}
.al-g{background:var(--gd);border:1px solid var(--gb);color:var(--g)}
.al-r{background:var(--rd);border:1px solid rgba(244,63,94,.2);color:#FB7185}
/* BOTTOM NAV */
.bn{position:fixed;bottom:0;left:0;right:0;background:rgba(9,9,11,.97);border-top:1px solid var(--b1);display:flex;z-index:500;backdrop-filter:blur(16px)}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;cursor:pointer;border:none;background:none;font-family:inherit}
.bni span:first-child{font-size:18px;line-height:1}.bni span:last-child{font-size:8px;font-weight:600;color:var(--t3)}
.bni.on span:last-child{color:var(--g)}
.fp{padding:5px 13px;border-radius:99px;font-size:11px;font-weight:600;border:1px solid var(--b2);background:var(--s2);cursor:pointer;transition:all .13s;color:var(--t2);white-space:nowrap}
.fp:hover{border-color:var(--b3);color:var(--t1)}.fp.on{background:var(--gd);border-color:var(--gb);color:var(--g)}
.at{flex:1;text-align:center;padding:7px;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--t3);transition:all .13s;font-family:inherit}
.at.on{background:var(--s1);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.3)}
/* LANG */
#ldrop{position:relative}#ldrop.open .ldd{display:block!important}
.ldd{position:absolute;top:calc(100%+6px);right:0;background:var(--s2);border:1px solid var(--b2);border-radius:16px;padding:6px;box-shadow:0 8px 32px rgba(0,0,0,.5);z-index:999;width:186px;display:none}
.lg2{display:grid;grid-template-columns:1fr 1fr;gap:1px}
.li{padding:5px 8px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;border:none;background:none;width:100%;text-align:left;color:var(--t1);font-family:inherit;transition:all .13s}
.li:hover{background:var(--s3)}.li.on{background:var(--gd);color:var(--g)}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:16px;padding:20px}
.pbar{height:4px;background:var(--s3);border-radius:99px;overflow:hidden}
.pbar-f{height:100%;background:var(--g);border-radius:99px;transition:width .3s}
.pbar-f.low{background:var(--ro)}
@media(max-width:900px){.pg{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}.mg{grid-template-columns:1fr 1fr}.hero-h{display:none}.nav-links{display:none}}
@media(max-width:480px){.pg{grid-template-columns:1fr 1fr}.mg{grid-template-columns:1fr 1fr}}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.8)}}

/* ADMIN SPECIFIC */
body{overflow:hidden}
#adm-login{
  position:fixed;inset:0;background:linear-gradient(145deg,#050709,#09090B);
  display:flex;align-items:center;justify-content:center;z-index:9999;
}
#adm-shell{
  display:none;height:100vh;overflow:hidden;
}
#adm-shell.on{display:flex;}
.asb-text{display:inline}
@media(max-width:768px){
  #adm-sb{min-width:50px!important;width:50px!important}
  .asb-text{display:none}
  .asec{display:none}
}
/* ===== PRIMESIM MASTER CSS v5 ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: #060608; color: #F2F2F5; overflow-x: hidden; }
button, input, select, textarea { font-family: inherit; color: inherit; }
a { text-decoration: none; color: inherit; }
img { display: block; }
::-webkit-scrollbar { width: 3px; } ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.08); border-radius: 99px; }

:root {
  /* Brand */
  --g: #00E887; --g2: #00C96E; --g3: rgba(0,232,135,.08); --gb: rgba(0,232,135,.2);
  --b: #3B82F6; --bd: rgba(59,130,246,.1); --bb: rgba(59,130,246,.2);
  --v: #A78BFA; --vd: rgba(167,139,250,.1);
  --o: #F97316; --od: rgba(249,115,22,.1);
  --r: #F43F5E; --rd: rgba(244,63,94,.1);
  --y: #EAB308; --yd: rgba(234,179,8,.1);
  /* Surface */
  --s0: #060608; --s1: #0D0D10; --s2: #141417; --s3: #1C1C21; --s4: #25252C; --s5: #2E2E38;
  /* Text */
  --t1: #F2F2F5; --t2: #A0A0B0; --t3: #6B6B80; --t4: #3F3F50;
  /* Borders */
  --e1: rgba(255,255,255,.05); --e2: rgba(255,255,255,.09); --e3: rgba(255,255,255,.14);
  /* Glow */
  --glow: 0 0 40px rgba(0,232,135,.12), 0 0 80px rgba(0,232,135,.06);
  /* Font */
  --ff: 'Clash Display', 'Space Grotesk', sans-serif;
  --fm: 'JetBrains Mono', monospace;
}

/* TOASTS */
#toasts { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--s2); border: 1px solid var(--e2); border-radius: 16px; padding: 11px 16px; font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 9px; animation: tin .25s cubic-bezier(.34,1.56,.64,1); pointer-events: all; box-shadow: 0 8px 40px rgba(0,0,0,.5); border-left: 3px solid var(--g); min-width: 200px; }
.toast.e { border-left-color: var(--r); }
.toast.w { border-left-color: var(--y); }
@keyframes tin { from { transform: translateX(120%) scale(.8); opacity: 0; } to { transform: none; opacity: 1; } }

/* MODAL */
#mwrap { position: fixed; inset: 0; background: rgba(0,0,0,.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 8000; display: none; align-items: center; justify-content: center; padding: 16px; }
#mwrap.on { display: flex; }
#mbox { background: var(--s2); border: 1px solid var(--e2); border-radius: 24px; padding: 28px; width: 100%; max-width: 600px; max-height: 92vh; overflow-y: auto; position: relative; animation: min .2s cubic-bezier(.34,1.56,.64,1); box-shadow: 0 32px 80px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.04); }
#mbox.lg { max-width: 820px; }
@keyframes min { from { transform: scale(.9) translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
.mx { position: absolute; top: 14px; right: 14px; width: 30px; height: 30px; border-radius: 50%; background: var(--s4); border: none; cursor: pointer; display: grid; place-items: center; font-size: 12px; color: var(--t2); transition: all .15s; }
.mx:hover { background: var(--s5); color: var(--t1); transform: scale(1.1); }
#mbox h2 { font-family: var(--ff); font-size: 18px; font-weight: 700; margin-bottom: 20px; color: var(--t1); }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 7px; font-family: var(--ff); font-weight: 600; font-size: 13px; padding: 10px 20px; border-radius: 14px; border: none; cursor: pointer; transition: all .18s cubic-bezier(.34,1.56,.64,1); white-space: nowrap; letter-spacing: .01em; }
.btn-g { background: var(--g); color: #031A0D; }
.btn-g:hover { background: #00FF9A; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,232,135,.3); }
.btn-g:active { transform: translateY(0); }
.btn-gl { background: var(--s3); border: 1px solid var(--e2); color: var(--t1); }
.btn-gl:hover { background: var(--s4); border-color: var(--e3); transform: translateY(-1px); }
.btn-ou { background: transparent; border: 1px solid var(--e2); color: var(--t2); }
.btn-ou:hover { border-color: var(--e3); color: var(--t1); }
.btn-red { background: var(--rd); border: 1px solid rgba(244,63,94,.2); color: #FB7185; }
.btn-red:hover { background: rgba(244,63,94,.15); }
.btn-amb { background: var(--yd); border: 1px solid rgba(234,179,8,.2); color: var(--y); }
.btn-sm { font-size: 11px; padding: 6px 13px; border-radius: 10px; }
.btn-xs { font-size: 10px; padding: 4px 9px; border-radius: 8px; }
.btn-lg { font-size: 15px; padding: 14px 28px; border-radius: 18px; }
.btn-fw { width: 100%; padding: 14px; justify-content: center; }
.btn-icon { width: 36px; height: 36px; padding: 0; border-radius: 10px; flex-shrink: 0; }

/* TOGGLE */
.tog { width: 36px; height: 20px; border-radius: 99px; position: relative; cursor: pointer; transition: background .2s; flex-shrink: 0; border: none; background: var(--s4); }
.tog.on { background: var(--g); }
.tog::after { content: ''; position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: white; transition: transform .2s cubic-bezier(.34,1.56,.64,1); box-shadow: 0 2px 4px rgba(0,0,0,.3); }
.tog.on::after { transform: translateX(16px); }

/* BADGE */
.bdg { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 99px; font-size: 9px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
.bg { background: var(--g3); color: var(--g); border: 1px solid var(--gb); }
.bb { background: var(--bd); color: #93C5FD; border: 1px solid var(--bb); }
.ba { background: var(--yd); color: var(--y); border: 1px solid rgba(234,179,8,.2); }
.br { background: var(--rd); color: #FB7185; border: 1px solid rgba(244,63,94,.2); }
.bv { background: var(--vd); color: var(--v); border: 1px solid rgba(167,139,250,.2); }
.bx { background: var(--e1); color: var(--t2); border: 1px solid var(--e2); }

/* FORM */
.f { display: flex; flex-direction: column; gap: 5px; }
.f label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--t3); }
.f input, .f select, .f textarea { background: var(--s3); border: 1px solid var(--e2); border-radius: 12px; padding: 10px 14px; font-size: 13px; color: var(--t1); outline: none; transition: border-color .15s, box-shadow .15s; width: 100%; }
.f input:focus, .f select:focus, .f textarea:focus { border-color: var(--g); box-shadow: 0 0 0 3px rgba(0,232,135,.1); }
.f select option { background: var(--s2); }
.f textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 11px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 11px; }
.fw { grid-column: 1 / -1; }
.fa { display: flex; gap: 9px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--e1); justify-content: flex-end; }

/* PLAN CARD */
.pc { background: var(--s2); border: 1px solid var(--e1); border-radius: 20px; padding: 20px; cursor: pointer; transition: all .25s cubic-bezier(.34,1.56,.64,1); position: relative; overflow: hidden; }
.pc::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(0,232,135,.04) 0%, transparent 60%); opacity: 0; transition: opacity .25s; border-radius: inherit; }
.pc:hover { border-color: var(--gb); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,232,135,.1), var(--glow); }
.pc:hover::before { opacity: 1; }
.pc.ft { border-color: var(--gb); background: linear-gradient(145deg, rgba(0,232,135,.06), var(--s2)); }
.pc.ft::after { content: 'TOP PICK'; position: absolute; top: 0; right: 0; background: var(--g); color: #031A0D; font-size: 8px; font-weight: 800; padding: 4px 10px; border-radius: 0 20px 0 12px; letter-spacing: .06em; }

/* CARD */
.card { background: var(--s2); border: 1px solid var(--e1); border-radius: 20px; padding: 22px; }

/* PLAN GRID */
.pg { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }

/* TABLE */
.tw { background: var(--s1); border: 1px solid var(--e1); border-radius: 20px; overflow: hidden; margin-bottom: 16px; }
.th { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--e1); gap: 9px; flex-wrap: wrap; min-height: 52px; }
.tt { font-family: var(--ff); font-size: 13px; font-weight: 700; color: var(--t1); }
.ts { background: var(--s3); border: 1px solid var(--e2); border-radius: 12px; padding: 7px 12px; font-size: 12px; outline: none; transition: all .15s; color: var(--t1); width: 180px; }
.ts:focus { border-color: var(--g); box-shadow: 0 0 0 3px rgba(0,232,135,.1); }
.tf { background: var(--s3); border: 1px solid var(--e2); border-radius: 12px; padding: 7px 11px; font-size: 11px; color: var(--t2); outline: none; cursor: pointer; }
table { width: 100%; border-collapse: collapse; }
thead th { padding: 9px 14px; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--t3); text-align: left; background: rgba(255,255,255,.015); border-bottom: 1px solid var(--e1); white-space: nowrap; }
tbody td { padding: 10px 14px; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,.02); color: var(--t2); vertical-align: middle; }
tbody tr:last-child td { border: none; }
tbody tr:hover td { background: rgba(255,255,255,.015); }
.t1 { color: var(--t1) !important; font-weight: 600; }
.tm { font-family: var(--fm); font-size: 10px !important; color: var(--t4) !important; }
.ta { display: flex; gap: 4px; flex-wrap: nowrap; }

/* METRICS */
.mg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px; }
.mc { background: var(--s1); border: 1px solid var(--e1); border-radius: 18px; padding: 16px 18px; position: relative; overflow: hidden; }
.mc::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 18px 18px 0 0; }
.mc.cg::after { background: linear-gradient(90deg, var(--g), #00A85F); }
.mc.cb::after { background: linear-gradient(90deg, var(--b), #6366F1); }
.mc.cv::after { background: linear-gradient(90deg, var(--v), #EC4899); }
.mc.ca::after { background: linear-gradient(90deg, var(--y), var(--o)); }
.mc.cr::after { background: linear-gradient(90deg, var(--r), var(--o)); }
.ml { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--t3); margin-bottom: 8px; }
.mv { font-family: var(--ff); font-size: 28px; font-weight: 800; color: var(--t1); line-height: 1; margin-bottom: 4px; }
.ms { font-size: 11px; color: var(--t3); }

/* ADMIN SIDEBAR */
.asec { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: var(--t4); padding: 12px 16px 4px; }
.asb { display: flex; align-items: center; gap: 9px; width: calc(100% - 12px); padding: 9px 11px; border-radius: 12px; margin: 2px 6px; font-size: 12px; font-weight: 600; color: var(--t3); cursor: pointer; border: none; background: none; text-align: left; transition: all .15s; white-space: nowrap; overflow: hidden; font-family: inherit; }
.asb:hover { background: var(--s3); color: var(--t1); }
.asb.on { background: var(--g3); color: var(--g); border-left: 2px solid var(--g); padding-left: 9px; }
.aic { font-size: 15px; width: 20px; text-align: center; flex-shrink: 0; }

/* ALERTS */
.al { border-radius: 12px; padding: 10px 14px; display: flex; align-items: flex-start; gap: 9px; margin-bottom: 12px; font-size: 12px; line-height: 1.6; }
.al-g { background: var(--g3); border: 1px solid var(--gb); color: var(--g); }
.al-b { background: var(--bd); border: 1px solid var(--bb); color: #93C5FD; }
.al-r { background: var(--rd); border: 1px solid rgba(244,63,94,.25); color: #FB7185; }
.al-y { background: var(--yd); border: 1px solid rgba(234,179,8,.2); color: var(--y); }

/* BOTTOM NAV */
.bn { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(6,6,8,.97); border-top: 1px solid var(--e1); display: flex; z-index: 600; backdrop-filter: blur(20px); padding-bottom: env(safe-area-inset-bottom); }
.bni { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 9px 0; cursor: pointer; border: none; background: none; font-family: inherit; transition: all .15s; }
.bni span:first-child { font-size: 19px; line-height: 1; transition: transform .2s cubic-bezier(.34,1.56,.64,1); }
.bni:hover span:first-child { transform: scale(1.2); }
.bni span:last-child { font-size: 8px; font-weight: 700; color: var(--t3); text-transform: uppercase; letter-spacing: .04em; }
.bni.on span:first-child { filter: drop-shadow(0 0 8px var(--g)); }
.bni.on span:last-child { color: var(--g); }

/* FILTER PILL */
.fp { padding: 6px 14px; border-radius: 99px; font-size: 11px; font-weight: 700; border: 1px solid var(--e2); background: var(--s2); cursor: pointer; transition: all .15s; color: var(--t2); white-space: nowrap; font-family: var(--ff); }
.fp:hover { border-color: var(--e3); color: var(--t1); }
.fp.on { background: var(--g3); border-color: var(--gb); color: var(--g); }

/* PROGRESS BAR */
.pbar { height: 5px; background: var(--s4); border-radius: 99px; overflow: hidden; }
.pbar-f { height: 100%; background: linear-gradient(90deg, var(--g), #00A85F); border-radius: 99px; transition: width .4s; }
.pbar-f.low { background: linear-gradient(90deg, var(--r), var(--o)); }

/* SCREEN */
.scr { display: none; min-height: 100vh; }
.scr.on { display: block; }

/* LANG */
.t { display: none; }
html[data-lang=tr] .t-tr, html[data-lang=en] .t-en, html[data-lang=de] .t-de,
html[data-lang=fr] .t-fr, html[data-lang=es] .t-es, html[data-lang=ar] .t-ar,
html[data-lang=zh] .t-zh, html[data-lang=ja] .t-ja, html[data-lang=ko] .t-ko,
html[data-lang=ru] .t-ru, html[data-lang=it] .t-it, html[data-lang=pt] .t-pt,
html[data-lang=nl] .t-nl, html[data-lang=pl] .t-pl, html[data-lang=sv] .t-sv,
html[data-lang=da] .t-da, html[data-lang=fi] .t-fi, html[data-lang=no] .t-no,
html[data-lang=th] .t-th, html[data-lang=id] .t-id { display: inline; }

/* DIVIDER */
.div { height: 1px; background: var(--e1); margin: 16px 0; }

/* SECTION */
.section { max-width: 1160px; margin: 0 auto; padding: 0 24px; }

/* GLOW ANIMATION */
@keyframes pulse-glow { 0%, 100% { box-shadow: var(--glow); } 50% { box-shadow: 0 0 60px rgba(0,232,135,.2), 0 0 120px rgba(0,232,135,.1); } }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .3; } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
@keyframes slide-up { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }

/* RESPONSIVE */
@media (max-width: 768px) { .mg { grid-template-columns: 1fr 1fr; } .g3 { grid-template-columns: 1fr 1fr; } .hero-desktop { display: none !important; } .nav-links { display: none !important; } }
@media (max-width: 480px) { .mg { grid-template-columns: 1fr 1fr; } .pg { grid-template-columns: 1fr 1fr; } .section { padding: 0 16px; } }

body{overflow:hidden!important}
</style>

var DB = {
  _d: null,
  load: function() { try { var r=localStorage.getItem(DBKEY); DB._d=r?JSON.parse(r):null; } catch(e){ DB._d=null; } return DB._d; },
  save: function(d) { try { localStorage.setItem(DBKEY,JSON.stringify(d)); DB._d=d; DB._emit(); return true; } catch(e){ return false; } },
  init: function() { if(!DB.load()) DB.save(JSON.parse(JSON.stringify(DFLT))); },
  reset: function() { DB.save(JSON.parse(JSON.stringify(DFLT))); toast('Database reset ✓'); },
  _emit: function() { try { window.dispatchEvent(new CustomEvent('dbchange')); new BroadcastChannel('ps5').postMessage(1); } catch(e){} },
  get: function() { return DB._d || DB.load() || JSON.parse(JSON.stringify(DFLT)); },

  // PLANS
  getPlans: function(opt) {
    var p=(DB.get().plans||[]).slice();
    if(!opt) return p;
    if(opt.on!==undefined) p=p.filter(function(x){return x.on===opt.on;});
    if(opt.feat) p=p.filter(function(x){return x.feat;});
    if(opt.region) p=p.filter(function(x){return x.region===opt.region;});
    if(opt.q){var q=opt.q.toLowerCase();p=p.filter(function(x){return x.country.toLowerCase().indexOf(q)>=0||x.region.toLowerCase().indexOf(q)>=0||(x.net||'').toLowerCase().indexOf(q)>=0;});}
    return p;
  },
  savePlan: function(plan) {
    var d=DB.get();
    var i=d.plans.findIndex(function(x){return x.id===plan.id;});
    if(i>=0){d.plans[i]=Object.assign({},d.plans[i],plan);}
    else{plan.id='P'+Date.now().toString().slice(-7);plan.sales=0;if(!plan.img)plan.img='';d.plans.push(plan);}
    return DB.save(d);
  },
  delPlan: function(id){var d=DB.get();d.plans=d.plans.filter(function(x){return x.id!==id;});DB.save(d);},
  togglePlan: function(id,key){var d=DB.get();var p=d.plans.find(function(x){return x.id===id;});if(p){p[key]=!p[key];DB.save(d);}return p?p[key]:false;},

  // USERS
  getUsers: function(){return (DB.get().users||[]).filter(function(u){return u.role!=='admin';});},
  getAllUsers: function(){return DB.get().users||[];},
  findUser: function(email){return (DB.get().users||[]).find(function(u){return u.email===email;});},
  login: function(email,pass){var u=DB.findUser(email);return(u&&u.pass===pass&&u.on!==false)?u:null;},
  saveUser: function(user){
    var d=DB.get();
    var i=d.users.findIndex(function(u){return u.id===user.id;});
    if(i>=0){d.users[i]=Object.assign({},d.users[i],user);DB.save(d);return{ok:true};}
    if(DB.findUser(user.email))return{err:'Email already exists'};
    user.id='U'+Date.now().toString().slice(-6);user.role=user.role||'user';user.tier=user.tier||'Traveler';
    user.pm=user.pm||0;user.orders=user.orders||[];user.reg=new Date().toISOString().slice(0,10);user.on=true;
    d.users.push(user);DB.save(d);return{ok:true};
  },
  register: function(name,email,pass){
    if(!name||!email||!pass)return{err:'All fields required'};
    if(pass.length<6)return{err:'Password min 6 chars'};
    if(DB.findUser(email))return{err:'Email already registered'};
    return DB.saveUser({id:'',name:name,email:email,pass:pass});
  },
  delUser: function(id){var d=DB.get();d.users=d.users.filter(function(u){return u.id!==id;});DB.save(d);},
  toggleUser: function(id){var d=DB.get();var u=d.users.find(function(x){return x.id===id;});if(u){u.on=!u.on;DB.save(d);}},

  // ORDERS
  getOrders: function(uid){var o=DB.get().orders||[];return uid?o.filter(function(x){return x.uid===uid;}):o;},
  createOrder: function(uid,pid,coupon){
    var d=DB.get();
    var plan=d.plans.find(function(p){return p.id===pid;});
    if(!plan||!plan.on)return{err:'Plan not available'};
    var amt=plan.rt,cpn=null;
    if(coupon&&d.cfg.coupons){var c=d.coupons[coupon.toUpperCase()];if(c&&c.on){amt=parseFloat((amt*(1-c.pct/100)).toFixed(2));cpn=coupon.toUpperCase();c.uses=(c.uses||0)+1;}}
    var user=d.users.find(function(u){return u.id===uid;});
    var tp={Traveler:5,Silver:6,Gold:7,Platinum:10};
    var pme=parseFloat((amt*((tp[user?user.tier:'Traveler']||5)/100)).toFixed(2));
    if(user){
      user.pm=parseFloat(((user.pm||0)+pme).toFixed(2));
      if(!user.orders)user.orders=[];
      var spent=d.orders.filter(function(o){return o.uid===uid;}).reduce(function(s,o){return s+o.amt;},0)+amt;
      if(spent>=200)user.tier='Platinum';else if(spent>=70)user.tier='Gold';else if(spent>=20)user.tier='Silver';
    }
    var ord={id:'O'+Date.now().toString().slice(-6),uid:uid,pid:pid,name:plan.flag+' '+plan.country+' '+plan.data,
      amt:amt,coupon:cpn,status:'active',iccid:'890142'+Date.now().toString().slice(-9),
      date:new Date().toISOString().slice(0,10),exp:new Date(Date.now()+plan.days*864e5).toISOString().slice(0,10),
      used:0,total:parseFloat(plan.data)||plan.days,prov:plan.provider,pm:pme};
    d.orders.push(ord);if(user)user.orders.push(ord.id);plan.sales=(plan.sales||0)+1;
    DB.save(d);return{ok:true,ord:ord,pme:pme,user:DB.findUser(user?user.email:'')};
  },

  // COUPONS
  getCoupons: function(){return DB.get().coupons||{};},
  validateCoupon: function(code){
    if(!code)return{valid:false};var d=DB.get();
    if(!d.cfg||!d.cfg.coupons)return{valid:false,reason:'Coupons disabled'};
    var c=d.coupons[code.toUpperCase()];return(c&&c.on)?{valid:true,pct:c.pct}:{valid:false};
  },
  saveCoupon: function(code,data){var d=DB.get();if(!d.coupons)d.coupons={};d.coupons[code.toUpperCase()]=data;DB.save(d);},
  delCoupon: function(code){var d=DB.get();delete d.coupons[code];DB.save(d);},
  toggleCoupon: function(code){var d=DB.get();if(d.coupons[code]){d.coupons[code].on=!d.coupons[code].on;DB.save(d);}},

  // CFG
  getCfg: function(){return DB.get().cfg||DFLT.cfg;},
  setCfg: function(key,val){var d=DB.get();d.cfg[key]=val;DB.save(d);},
  setFX: function(cur,rate){var d=DB.get();d.cfg.fx[cur]=parseFloat(rate)||1;DB.save(d);},

  // STATS
  stats: function(){
    var d=DB.get();
    var pl=d.plans||[],us=(d.users||[]).filter(function(u){return u.role!=='admin';}),or=d.orders||[];
    var rev=or.reduce(function(s,o){return s+o.amt;},0);
    return{plans:pl.length,active:pl.filter(function(p){return p.on;}).length,featured:pl.filter(function(p){return p.feat;}).length,users:us.length,orders:or.length,rev:rev.toFixed(2),avg:or.length?(rev/or.length).toFixed(2):'0.00'};
  },

  // FX
  fx: function(usd,cur){
    var r=DB.getCfg().fx[cur]||1;
    var s={USD:'$',EUR:'€',TRY:'₺',GBP:'£',JPY:'¥',KRW:'₩',AUD:'A$',CAD:'C$',CHF:'Fr',SGD:'S$',AED:'د.إ',SAR:'﷼',BRL:'R$',INR:'₹',MXN:'MX$',PLN:'zł',SEK:'kr',DKK:'kr',NOK:'kr',THB:'฿'};
    var v=usd*r;return(s[cur]||cur+' ')+(v<10?v.toFixed(2):Math.round(v));
  },

  // EXPORT
  export: function(){
    var s=JSON.stringify(DB.get(),null,2);
    var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([s],{type:'application/json'}));
    a.download='primesim_db_'+new Date().toISOString().slice(0,10)+'.json';a.click();
  },

  // IMPORT from JSON
  importJSON: function(jsonStr){
    try{var d=JSON.parse(jsonStr);if(!d.plans||!d.users)return{err:'Invalid format'};DB.save(d);return{ok:true};}
    catch(e){return{err:'Parse error: '+e.message};}
  }
};

  doBulkImport: function(){
    var csv=(document.getElementById('bulk-csv')||{}).value||'';
    if(!csv.trim()){toast('No data to import','e');return;}
    var count=0,err=0;
    csv.trim().split('\n').forEach(function(line){
      if(!line.trim())return;
      var parts=line.split(',').map(function(s){return s.trim();});
      var country=parts[0],flag=parts[1],region=parts[2],data=parts[3],days=parts[4],speed=parts[5],provider=parts[6],ws=parts[7],rt=parts[8],net=parts[9];
      if(!country||!rt||parseFloat(rt)<=0){err++;return;}
      DB.savePlan({id:'',country:country,flag:flag||'🌍',region:region||'Global',data:data||'5GB',days:parseInt(days)||15,speed:speed||'4G',provider:provider||'eSIM Access',ws:parseFloat(ws)||5,rt:parseFloat(rt),net:net||'',on:true,feat:false,img:'',desc:'',pkg:'',sales:0});
      count++;
    });
    closeModal();Admin.go('plans');toast(count+' plans imported → LIVE on primesim.co'+(err?' ('+err+' rows skipped)':'')+' ✓');
  },

    h+='<button class="btn btn-g btn-sm" data-action="open-coupon-modal" data-id="">+ Add Coupon</button></div>';
    h+='<div class="tw"><div class="th"><span class="tt">Coupon Codes</span></div>';
    h+='<table><thead><tr><th>Code</th><th>Discount</th><th>Description</th><th>Uses</th><th>Active</th><th>Actions</th></tr></thead><tbody>';
    Object.keys(coupons).forEach(function(code){
      var c=coupons[code];
      h+='<tr><td><code style="background:var(--gd);padding:3px 10px;border-radius:6px;font-size:12px;color:var(--g);letter-spacing:1px;font-weight:700">'+code+'</code></td>';

  openCouponModal: function(code){
    var c=code?DB.getCoupons()[code]:null;
    var h='<h2>'+(c?'Edit Coupon: '+code:'Add New Coupon')+'</h2>';
    h+='<div class="f"><label>Code * (e.g. SUMMER30)</label><input id="cm-code" value="'+(code||'')+'" placeholder="SUMMER30" style="text-transform:uppercase;font-family:monospace;font-size:14px;letter-spacing:1px" oninput="this.value=this.value.toUpperCase()"></div>';
    h+='<div class="f"><label>Discount Percentage * (%)</label><input id="cm-pct" type="number" value="'+(c?c.pct:20)+'" min="1" max="99"></div>';
    h+='<div class="f"><label>Description</label><input id="cm-desc" value="'+(c&&c.desc?c.desc:'')+'" placeholder="Summer sale discount"></div>';
    h+='<div style="display:flex;align-items:center;gap:8px;margin:10px 0"><button id="cm-tg" class="tog '+(c&&c.on!==false?'on':'')+'" onclick="this.classList.toggle(\'on\')"></button><span style="font-size:12px;font-weight:600">Active (works on checkout immediately)</span></div>';
    h+='<div class="fa"><button class="btn btn-gl" onclick="closeModal()">Cancel</button><button class="btn btn-g" data-action="save-coupon" data-oldcode="'+(code||'')+'">💾 Save Coupon → Live</button></div>';
    openModal(h);
  },

  saveCoupon: function(oldCode){
    var code=(document.getElementById('cm-code')||{}).value||'';
    var pct=parseInt((document.getElementById('cm-pct')||{}).value)||0;
    var desc=(document.getElementById('cm-desc')||{}).value||'';
    var on=document.getElementById('cm-tg')?document.getElementById('cm-tg').classList.contains('on'):true;
    code=code.trim().toUpperCase();
    if(!code||!pct){toast('Code and discount percentage are required','e');return;}
    var uses=oldCode&&DB.getCoupons()[oldCode]?DB.getCoupons()[oldCode].uses||0:0;
    if(oldCode&&oldCode!==code)DB.delCoupon(oldCode);
    DB.saveCoupon(code,{pct:pct,on:on,desc:desc,uses:uses});
    closeModal();Admin.go('coupons');toast('Coupon "'+code+'" saved → works on checkout ✓');
  },

  pg_revenue: function(){
    var orders=DB.getOrders().slice().reverse();
    var total=orders.reduce(function(s,o){return s+o.amt;},0);
    var pmTotal=orders.reduce(function(s,o){return s+(o.pm||0);},0);
    var h='<h2 style="font-family:var(--fn);font-size:22px;font-weight:800;margin-bottom:18px">Revenue Analytics</h2>';
    h+='<div class="mg">';
    h+='<div class="mc cg"><div class="ml">Gross Revenue</div><div class="mv">$'+total.toFixed(2)+'</div></div>';
    h+='<div class="mc cb"><div class="ml">Total Orders</div><div class="mv">'+orders.length+'</div></div>';
    h+='<div class="mc ca"><div class="ml">Avg Order Value</div><div class="mv">$'+(orders.length?(total/orders.length).toFixed(2):'0.00')+'</div></div>';
    h+='<div class="mc cv"><div class="ml">PM Issued</div><div class="mv">$'+pmTotal.toFixed(2)+'</div></div></div>';
    h+='<div class="tw"><div class="th"><span class="tt">Transaction Log</span><button class="btn btn-gl btn-sm" onclick="DB.export()">📥 Export CSV</button></div>';
    h+='<div style="overflow-x:auto"><table><thead><tr><th>ID</th><th>User</th><th>Plan</th><th>Amount</th><th>Coupon</th><th>PM Earned</th><th>Provider</th><th>Date</th></tr></thead><tbody>';
    orders.forEach(function(o){
      h+='<tr><td class="tm">'+o.id+'</td><td style="color:var(--t2)">'+o.uid+'</td><td>'+o.name+'</td>';
      h+='<td style="color:var(--g);font-weight:700">$'+o.amt+'</td>';
      h+='<td>'+(o.coupon?badge(o.coupon,'bv'):'—')+'</td>';
      h+='<td style="color:var(--am)">$'+(o.pm||0)+'</td>';
      h+='<td style="color:var(--t3)">'+(o.prov||'—')+'</td>';
      h+='<td class="tm">'+o.date+'</td></tr>';
    });
    h+='</tbody></table><div style="padding:8px 16px;font-size:10px;color:var(--t3);border-top:1px solid var(--b1)">$'+total.toFixed(2)+' total · $'+pmTotal.toFixed(2)+' PrimeMoney issued</div></div></div>';
    return h;
  },

  // GLOBAL EVENT DELEGATION
document.addEventListener('click',function(e){
  var el=e.target.closest('[data-action]');
  if(!el)return;
  var action=el.dataset.action,id=el.dataset.id||'';
  switch(action){
    case 'toggle-feat':
      DB.togglePlan(id,'feat');
      var fn1=Admin['pg_'+Admin._page];if(fn1){var c1=document.getElementById('adm-content');if(c1)c1.innerHTML=fn1();}
      toast('Featured toggled ✓');break;
    case 'toggle-on':
      var v1=DB.togglePlan(id,'on');
      var fn2=Admin['pg_'+Admin._page];if(fn2){var c2=document.getElementById('adm-content');if(c2)c2.innerHTML=fn2();}
      toast('Plan '+(v1?'activated':'deactivated')+' ✓');break;
    case 'edit-plan':Admin.openPlanModal(id||null);break;
    case 'open-plan-modal':Admin.openPlanModal(null);break;
    case 'dup-plan':
      var d1=DB.get();var pp=d1.plans.find(function(x){return x.id===id;});
      if(pp){var cp=JSON.parse(JSON.stringify(pp));cp.id='P'+Date.now().toString().slice(-7);cp.country+=' (copy)';cp.sales=0;d1.plans.push(cp);DB.save(d1);Admin.go('plans');toast('Duplicated ✓');}
      break;
    case 'del-plan':
      var nm=el.dataset.name||id;
      if(confirm('Delete plan: '+nm+'?\nThis will remove it from primesim.co immediately.')){DB.delPlan(id);Admin.go('plans');toast('Plan deleted ✓');}
      break;
    case 'save-plan':Admin.savePlan(id);break;
    case 'toggle-user':
      DB.toggleUser(id);Admin.go('users');toast('User status updated ✓');break;
    case 'edit-user':Admin.openUserModal(id||null);break;
    case 'open-user-modal':Admin.openUserModal(null);break;
    case 'del-user':
      var un=el.dataset.name||id;
      if(confirm('Delete user: '+un+'?')){DB.delUser(id);Admin.go('users');toast('User deleted ✓');}
      break;
    case 'save-user':Admin.saveUser(id);break;
    case 'toggle-coupon':DB.toggleCoupon(id);Admin.go('coupons');toast('Coupon '+(DB.getCoupons()[id]&&DB.getCoupons()[id].on?'enabled':'disabled')+' ✓');break;
    case 'edit-coupon':Admin.openCouponModal(id||null);break;
    case 'open-coupon-modal':Admin.openCouponModal(null);break;
    case 'del-coupon':
      if(confirm('Delete coupon: '+id+'?')){DB.delCoupon(id);Admin.go('coupons');toast('Coupon deleted ✓');}
      break;
    case 'save-coupon':Admin.saveCoupon(el.dataset.oldcode||'');break;
    case 'toggle-cfg':
      var cv=DB.getCfg()[id];DB.setCfg(id,!cv);
      var fn3=Admin.pg_settings;if(fn3){var c3=document.getElementById('adm-content');if(c3)c3.innerHTML=fn3();}
      toast(id+' '+(cv?'disabled':'enabled')+' ✓');break;
    case 'do-bulk-import':Admin.doBulkImport();break;
  }
});

document.addEventListener('change',function(e){
  var el=e.target;
  if(el.dataset.action==='set-fx'){DB.setFX(el.dataset.id,parseFloat(el.value)||1);toast(el.dataset.id+' FX rate updated ✓');}
});

document.addEventListener('DOMContentLoaded',function(){

  // Auto-show login

});
