<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>primesim — Admin Panel</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Inter',sans-serif;background:#09090B;color:#FAFAFA;overflow-x:hidden}
button,input,select,textarea{font-family:inherit;color:inherit}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:9px}
:root{
  --g:#10B981;--g2:#059669;--gd:rgba(16,185,129,.12);--gb:rgba(16,185,129,.25);
  --b:#3B82F6;--bd:rgba(59,130,246,.12);
  --a:#F59E0B;--ad:rgba(245,158,11,.12);
  --r:#F43F5E;--rd:rgba(244,63,94,.12);
  --v:#8B5CF6;--vd:rgba(139,92,246,.12);
  --s0:#09090B;--s1:#111113;--s2:#18181B;--s3:#27272A;--s4:#3F3F46;
  --t1:#FAFAFA;--t2:#A1A1AA;--t3:#71717A;--t4:#52525B;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.1);--b3:rgba(255,255,255,.18);
  --fn:'Syne',sans-serif;
}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:var(--fn);font-weight:600;font-size:13px;padding:9px 18px;border-radius:18px;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-g{background:var(--g);color:#052E1C}.btn-g:hover{background:var(--g2);transform:translateY(-1px);box-shadow:0 4px 18px rgba(16,185,129,.3)}
.btn-gl{background:rgba(255,255,255,.07);border:1px solid var(--b2);color:var(--t1)}.btn-gl:hover{background:rgba(255,255,255,.12)}
.btn-ou{background:transparent;border:1px solid var(--b2);color:var(--t2)}.btn-ou:hover{border-color:var(--b3);color:var(--t1)}
.btn-red{background:var(--rd);border:1px solid rgba(244,63,94,.2);color:#FB7185}.btn-red:hover{background:rgba(244,63,94,.2)}
.btn-amb{background:var(--ad);border:1px solid rgba(245,158,11,.2);color:#FCD34D}
.btn-sm{font-size:11px;padding:5px 12px;border-radius:10px}
.btn-xs{font-size:10px;padding:3px 8px;border-radius:8px}
.btn-lg{font-size:15px;padding:13px 26px}
.btn-fw{width:100%;padding:13px;justify-content:center}
/* TOAST */
#toasts{position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:10px 14px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;animation:tIn .2s ease;pointer-events:all;box-shadow:0 8px 32px rgba(0,0,0,.5);border-left:3px solid var(--g)}
.toast.e{border-left-color:var(--r)}.toast.w{border-left-color:var(--a)}
@keyframes tIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}
/* MODAL */
#mwrap{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(12px);z-index:8000;display:none;align-items:center;justify-content:center;padding:16px}
#mwrap.on{display:flex}
#mbox{background:var(--s2);border:1px solid var(--b2);border-radius:24px;padding:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative;animation:mIn .2s ease;box-shadow:0 24px 64px rgba(0,0,0,.6)}
#mbox.lg{max-width:760px}
@keyframes mIn{from{transform:scale(.94) translateY(12px);opacity:0}to{transform:none;opacity:1}}
.mx{position:absolute;top:13px;right:13px;width:28px;height:28px;border-radius:50%;background:var(--s3);border:none;cursor:pointer;display:grid;place-items:center;font-size:13px;color:var(--t2);transition:all .13s}
.mx:hover{background:var(--s4);color:var(--t1)}
#mbox h2{font-family:var(--fn);font-size:17px;font-weight:700;margin-bottom:16px}
/* FORM */
.f{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.f.fw{grid-column:1/-1}
.f label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)}
.f input,.f select,.f textarea{background:var(--s3);border:1px solid var(--b2);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--t1);outline:none;transition:border-color .13s;width:100%}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--g)}
.f select option{background:var(--s2)}
.f textarea{resize:vertical;min-height:70px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.fa{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--b1)}
/* TOGGLE */
.tog{width:34px;height:19px;border-radius:99px;position:relative;cursor:pointer;transition:background .18s;flex-shrink:0;border:none;background:var(--s4)}
.tog.on{background:var(--g)}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:white;transition:transform .18s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.tog.on::after{transform:translateX(15px)}
/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:9px;font-weight:700;letter-spacing:.03em}
.bg{background:var(--gd);color:var(--g)}.bb{background:var(--bd);color:#93C5FD}
.ba{background:var(--ad);color:#FCD34D}.br{background:var(--rd);color:#FB7185}
.bv{background:var(--vd);color:#C4B5FD}.bx{background:rgba(255,255,255,.06);color:var(--t2)}
/* PLAN CARD */
.pc{background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.pc:hover{border-color:var(--g);transform:translateY(-3px);box-shadow:0 8px 32px rgba(16,185,129,.12)}
.pc.ft{border-color:var(--gb)}
.pc.ft::after{content:'TOP PICK';position:absolute;top:0;right:0;background:var(--g);color:#052E1C;font-size:8px;font-weight:800;padding:3px 9px;border-radius:0 18px 0 12px}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
/* TABLE */
.tw{background:var(--s1);border:1px solid var(--b1);border-radius:18px;overflow:hidden;margin-bottom:12px}
.th{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1);gap:8px;flex-wrap:wrap}
.tt{font-family:var(--fn);font-size:13px;font-weight:700}
.ts{background:var(--s3);border:1px solid var(--b2);border-radius:10px;padding:5px 10px;font-size:11px;outline:none;width:160px;transition:border-color .13s;color:var(--t1)}
.ts:focus{border-color:var(--g)}
.tf{background:var(--s3);border:1px solid var(--b2);border-radius:10px;padding:5px 10px;font-size:11px;color:var(--t2);outline:none;cursor:pointer}
table{width:100%;border-collapse:collapse}
thead th{padding:7px 12px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);text-align:left;background:rgba(255,255,255,.02);border-bottom:1px solid var(--b1);white-space:nowrap}
tbody td{padding:9px 12px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.025);color:var(--t2);vertical-align:middle}
tbody tr:last-child td{border:none}
tbody tr:hover td{background:rgba(255,255,255,.015)}
.t1{color:var(--t1)!important;font-weight:600}
.tm{font-family:monospace;font-size:9px!important;color:var(--t4)!important}
.ta{display:flex;gap:3px}
/* METRIC */
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.mc{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.mc.cg::before{background:var(--g)}.mc.cb::before{background:var(--b)}
.mc.cv::before{background:var(--v)}.mc.ca::before{background:var(--a)}.mc.cr::before{background:var(--r)}
.ml{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px}
.mv{font-family:var(--fn);font-size:24px;font-weight:800;color:var(--t1);line-height:1;margin-bottom:3px}
.ms{font-size:10px;color:var(--t3)}
/* ADMIN SIDEBAR */
.asec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--t4);padding:10px 13px 3px;white-space:nowrap}
.asb{display:flex;align-items:center;gap:7px;width:calc(100% - 10px);padding:7px 10px;border-radius:10px;margin:1px 5px;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;border:none;background:none;text-align:left;transition:all .13s;white-space:nowrap;overflow:hidden;font-family:inherit}
.asb:hover{background:var(--s3);color:var(--t1)}.asb.on{background:var(--gd);color:var(--g)}
.aic{font-size:13px;width:17px;text-align:center;flex-shrink:0}
/* ALERT */
.al{border-radius:10px;padding:9px 12px;display:flex;align-items:flex-start;gap:8px;margin-bottom:10px;font-size:12px}
.al-w{background:var(--ad);border:1px solid rgba(245,158,11,.2);color:#FCD34D}
.al-i{background:var(--bd);border:1px solid rgba(59,130,246,.2);color:#93C5FD}
.al-g{background:var(--gd);border:1px solid var(--gb);color:var(--g)}
.al-r{background:var(--rd);border:1px solid rgba(244,63,94,.2);color:#FB7185}
/* FILTERS */
.fp{padding:5px 13px;border-radius:99px;font-size:11px;font-weight:600;border:1px solid var(--b2);background:var(--s2);cursor:pointer;transition:all .13s;color:var(--t2);white-space:nowrap}
.fp:hover{border-color:var(--b3);color:var(--t1)}.fp.on{background:var(--gd);border-color:var(--gb);color:var(--g)}
/* PBAR */
.pbar{height:4px;background:var(--s3);border-radius:99px;overflow:hidden}
.pbar-f{height:100%;background:var(--g);border-radius:99px;transition:width .3s}
.pbar-f.low{background:var(--r)}
.empty{text-align:center;padding:48px 20px;color:var(--t3)}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(1.8)}}
@media(max-width:900px){.mg{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.mg{grid-template-columns:1fr 1fr}}
</style>
</head>

    try { var r=localStorage.getItem(DBKEY); DB.d=r?JSON.parse(r):null; } catch(e){ DB.d=null; }
    return DB.d;
  },
  save: function(d) {
    try { localStorage.setItem(DBKEY,JSON.stringify(d)); DB.d=d; DB.emit(); return true; } catch(e){ return false; }
  },
  init: function() { if(!DB.load()) DB.save(JSON.parse(JSON.stringify(DFLT))); },
  reset: function() { DB.save(JSON.parse(JSON.stringify(DFLT))); toast('Database reset to defaults'); },
  emit: function() {
    window.dispatchEvent(new CustomEvent('dbchange'));
    try { var c=new BroadcastChannel('ps5'); c.postMessage(1); c.close(); } catch(e){}
  },
  get: function() { return DB.d || DB.load(); },
  getPlans: function(opt) {
    var p = (DB.get()||{}).plans || [];
    if(!opt) return p;
    if(opt.on!==undefined) p=p.filter(function(x){return x.on===opt.on;});
    if(opt.feat) p=p.filter(function(x){return x.feat;});
    if(opt.region) p=p.filter(function(x){return x.region===opt.region;});
    if(opt.q) { var q=opt.q.toLowerCase(); p=p.filter(function(x){return x.country.toLowerCase().indexOf(q)>=0||x.region.toLowerCase().indexOf(q)>=0||x.net.toLowerCase().indexOf(q)>=0;}); }
    return p;
  },
  savePlan: function(plan) {
    var d=DB.get(); if(!d) return false;
    var i=d.plans.findIndex(function(x){return x.id===plan.id;});
    if(i>=0) { d.plans[i]=Object.assign({},d.plans[i],plan); }
    else { plan.id='P'+Date.now().toString().slice(-7); plan.sales=0; d.plans.push(plan); }
    return DB.save(d);
  },
  delPlan: function(id) { var d=DB.get(); if(!d) return; d.plans=d.plans.filter(function(x){return x.id!==id;}); DB.save(d); },
  togglePlan: function(id, key) {
    var d=DB.get(); if(!d) return false;
    var p=d.plans.find(function(x){return x.id===id;});
    if(p){ p[key]=!p[key]; DB.save(d); return p[key]; } return false;
  },
  getUsers: function() { return ((DB.get()||{}).users||[]).filter(function(u){return u.role!=='admin';}); },
  getAllUsers: function() { return (DB.get()||{}).users||[]; },
  findUser: function(email) { return ((DB.get()||{}).users||[]).find(function(u){return u.email===email;}); },
  login: function(email, pass) { var u=DB.findUser(email); return (u&&u.pass===pass&&u.on)?u:null; },
  saveUser: function(user) {
    var d=DB.get(); if(!d) return {err:'DB error'};
    var i=d.users.findIndex(function(u){return u.id===user.id;});
    if(i>=0){ d.users[i]=Object.assign({},d.users[i],user); DB.save(d); return {ok:true}; }
    if(DB.findUser(user.email)) return {err:'Email already exists'};
    user.id='U'+Date.now().toString().slice(-6);
    user.role=user.role||'user'; user.tier=user.tier||'Traveler';
    user.pm=user.pm||0; user.orders=user.orders||[];
    user.reg=new Date().toISOString().slice(0,10); user.on=true;
    d.users.push(user); DB.save(d); return {ok:true};
  },
  delUser: function(id) { var d=DB.get(); if(!d) return; d.users=d.users.filter(function(u){return u.id!==id;}); DB.save(d); },
  toggleUser: function(id) { var d=DB.get(); if(!d) return; var u=d.users.find(function(x){return x.id===id;}); if(u){u.on=!u.on;DB.save(d);} },
  getOrders: function(uid) { var o=(DB.get()||{}).orders||[]; return uid?o.filter(function(x){return x.uid===uid;}):o; },
  getCoupons: function() { return (DB.get()||{}).coupons||{}; },
  saveCoupon: function(code, data) { var d=DB.get(); if(!d.coupons)d.coupons={}; d.coupons[code.toUpperCase()]=data; DB.save(d); },
  delCoupon: function(code) { var d=DB.get(); delete d.coupons[code]; DB.save(d); },
  toggleCoupon: function(code) { var d=DB.get(); if(d.coupons[code]){d.coupons[code].on=!d.coupons[code].on;DB.save(d);} },
  getCfg: function() { return (DB.get()||{}).cfg||DFLT.cfg; },
  setCfg: function(key, val) { var d=DB.get(); d.cfg[key]=val; DB.save(d); },
  setFX: function(cur, rate) { var d=DB.get(); d.cfg.fx[cur]=rate; DB.save(d); },
  stats: function() {
    var d=DB.get();
    var pl=(d||{}).plans||[], us=((d||{}).users||[]).filter(function(u){return u.role!=='admin';}), or=(d||{}).orders||[];
    var rev=or.reduce(function(s,o){return s+o.amt;},0);
    return {plans:pl.length,active:pl.filter(function(p){return p.on;}).length,users:us.length,orders:or.length,rev:rev.toFixed(2),avg:or.length?(rev/or.length).toFixed(2):'0.00'};
  },
  export: function() {
    var s=JSON.stringify(DB.get(),null,2);
    var a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([s],{type:'application/json'}));
    a.download='primesim_db_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  }
};

function toast(msg, type) {
  var c=document.getElementById('toasts'); if(!c) return;
  var el=document.createElement('div');
  el.className='toast'+(type?' '+type:'');
  el.innerHTML='<span style="font-size:14px">'+(type==='e'?'❌':type==='w'?'⚠️':'✅')+'</span>'+msg;
  c.appendChild(el);
  setTimeout(function(){ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(function(){el.remove();},300); }, 3000);
}
function openModal(html, lg) {
  var mbox=document.getElementById('mbox');
  if(lg) mbox.classList.add('lg'); else mbox.classList.remove('lg');
  document.getElementById('mbody').innerHTML=html;
  document.getElementById('mwrap').classList.add('on');
}
function closeModal() { document.getElementById('mwrap').classList.remove('on'); }
function badge(text, cls) { return '<span class="bdg '+cls+'">'+text+'</span>'; }
function tierBadge(t) { var m={Traveler:'bx',Silver:'bx',Gold:'ba',Platinum:'bv'}; return badge(t,m[t]||'bx'); }
function statusBadge(s) { var m={active:'bg',pending:'ba',expired:'br',inactive:'br'}; return badge(s,m[s]||'bx'); }
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeModal(); });

try { var ch=new BroadcastChannel('ps5'); ch.onmessage=function(){ DB.load(); if(Admin._loggedIn) Admin.go(Admin._page); toast('Sync from primesim.co ✓',''); }; } catch(e){}

  doBulkImport: function() {
    var csv = (document.getElementById('bulk-csv')||{}).value||'';
    if(!csv.trim()){ toast('No data','e'); return; }
    var count=0, err=0;
    csv.trim().split('\n').forEach(function(line) {
      var parts = line.split(',').map(function(s){return s.trim();});
      var country=parts[0], flag=parts[1], region=parts[2], data=parts[3], days=parts[4], speed=parts[5], provider=parts[6], ws=parts[7], rt=parts[8], net=parts[9];
      if(!country||!rt||parseFloat(rt)<=0){ err++; return; }
      DB.savePlan({id:'',country:country,flag:flag||'🌍',region:region||'Global',data:data||'5GB',days:parseInt(days)||15,speed:speed||'4G',provider:provider||'eSIM Access',ws:parseFloat(ws)||5,rt:parseFloat(rt),net:net||'',on:true,feat:false,img:'',desc:'',pkg:'',sales:0});
      count++;
    });
    closeModal(); Admin.go('plans');
    toast(count+' plans imported'+(err?' ('+err+' skipped)':'')+' → LIVE ✓');
  },

  pg_users: function() {
    var users = DB.getUsers();
    var h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">';
    h += '<div><h2 style="font-family:var(--fn);font-size:20px;font-weight:800">Users</h2><p style="font-size:11px;color:var(--t3);margin-top:3px">Real accounts — credentials work on primesim.co</p></div>';
    h += '<div style="display:flex;gap:6px"><button class="btn btn-gl btn-sm" onclick="DB.export()">📥 Export</button><button class="btn btn-g btn-sm" data-action="open-user-modal" data-id="">+ Add User</button></div></div>';
    h += '<div class="mg" style="grid-template-columns:repeat(3,1fr)">';
    h += '<div class="mc cg"><div class="ml">Total</div><div class="mv">'+users.length+'</div></div>';
    h += '<div class="mc cb"><div class="ml">Active</div><div class="mv">'+users.filter(function(u){return u.on;}).length+'</div></div>';
    h += '<div class="mc ca"><div class="ml">Total PM</div><div class="mv">$'+users.reduce(function(s,u){return s+(u.pm||0);},0).toFixed(2)+'</div></div></div>';
    h += '<div class="tw"><div class="th"><div style="display:flex;align-items:center;gap:8px"><span class="tt">All Users</span><input class="ts" placeholder="Search..." oninput="Admin._filterU(this.value)"></div></div>';
    h += '<table><thead><tr><th>Name</th><th>Email</th><th>Password</th><th>Tier</th><th>PM</th><th>Orders</th><th>Active</th><th>Actions</th></tr></thead>';
    h += '<tbody id="users-tb">'+Admin._userRows(users)+'</tbody></table></div>';
    return h;
  },

  _userRows: function(users) {
    var h = '';
    users.forEach(function(u) {
      h += '<tr><td class="t1">'+u.name+'</td><td style="color:var(--t2)">'+u.email+'</td>';
      h += '<td style="font-family:monospace;font-size:10px;color:var(--t4)">'+u.pass+'</td>';
      h += '<td>'+tierBadge(u.tier)+'</td>';
      h += '<td style="color:var(--a)">$'+(u.pm||0).toFixed(2)+'</td>';
      h += '<td style="color:#60A5FA">'+(u.orders||[]).length+'</td>';
      h += '<td><button class="tog '+(u.on?'on':'')+'\" data-action="toggle-user" data-id="'+u.id+'"></button></td>';
      h += '<td><div class="ta"><button class="btn btn-gl btn-xs" data-action="edit-user" data-id="'+u.id+'">✏️</button><button class="btn btn-red btn-xs" data-action="del-user" data-id="'+u.id+'" data-name="'+u.name+'">✕</button></div></td>';
      h += '</tr>';
    });
    return h;
  },

  _filterU: function(q) {
    var users = DB.getUsers().filter(function(u){ return !q||u.name.toLowerCase().indexOf(q.toLowerCase())>=0||u.email.toLowerCase().indexOf(q.toLowerCase())>=0; });
    var tb = document.getElementById('users-tb'); if(tb) tb.innerHTML = Admin._userRows(users);
  },

  openUserModal: function(id) {
    var u = id ? DB.getAllUsers().find(function(x){return x.id===id;}) : null;
    var h = '<h2>'+(u?'Edit: '+u.name:'Add User')+'</h2><div class="g2">';
    h += '<div class="f"><label>Full Name *</label><input id="um-n" value="'+(u?u.name:'')+'" placeholder="John Doe"></div>';
    h += '<div class="f"><label>Email *</label><input id="um-e" type="email" value="'+(u?u.email:'')+'"></div>';
    h += '<div class="f"><label>Password *</label><input id="um-p" type="text" value="'+(u?u.pass:'')+'" placeholder="min 6 chars"></div>';
    h += '<div class="f"><label>Tier</label><select id="um-t">';
    ['Traveler','Silver','Gold','Platinum'].forEach(function(t){ h+='<option'+(u&&u.tier===t?' selected':'')+'>'+t+'</option>'; });
    h += '</select></div>';
    h += '<div class="f"><label>PrimeMoney ($)</label><input id="um-pm" type="number" step="0.01" value="'+(u?u.pm||0:0)+'"></div>';
    h += '<div class="f"><label>Role</label><select id="um-role"><option'+(u&&u.role==='admin'?' selected':'')+'>admin</option><option'+(u&&u.role!=='admin'?' selected':'')+'>user</option></select></div>';
    h += '</div><div class="fa"><button class="btn btn-gl" onclick="closeModal()">Cancel</button>';
    h += '<button class="btn btn-g" data-action="save-user" data-id="'+(id||'')+'">💾 Save User</button></div>';
    openModal(h);
  },

  saveUser: function(id) {
    var v = function(elId){ var el=document.getElementById(elId); return el?el.value:''; };
    var existing = id ? DB.getAllUsers().find(function(x){return x.id===id;}) : null;
    var user = existing ? JSON.parse(JSON.stringify(existing)) : {};
    user.id = id||''; user.name = v('um-n').trim(); user.email = v('um-e').trim();
    user.pass = v('um-p').trim(); user.tier = v('um-t');
    user.pm = parseFloat(v('um-pm'))||0; user.role = v('um-role'); user.on = true;
    if(!user.name||!user.email||!user.pass){ toast('Name, email and password required','e'); return; }
    var r = DB.saveUser(user);
    if(r&&r.err){ toast(r.err,'e'); return; }
    closeModal(); Admin.go('users'); toast('"'+user.name+'" saved ✓');
  },

  // ── ORDERS ──
  pg_orders: function() {
    var orders = DB.getOrders().slice().reverse();
    var total = orders.reduce(function(s,o){return s+o.amt;},0);
    var h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">';
    h += '<h2 style="font-family:var(--fn);font-size:20px;font-weight:800">Orders</h2>';
    h += '<button class="btn btn-gl btn-sm" onclick="DB.export()">📥 Export</button></div>';
    h += '<div class="tw"><div class="th"><span class="tt">All Orders ('+orders.length+')</span></div>';
    h += '<table><thead><tr><th>ID</th><th>User</th><th>Plan</th><th>Amount</th><th>Coupon</th><th>PM</th><th>ICCID</th><th>Date</th><th>Status</th></tr></thead><tbody>';
    orders.forEach(function(o) {
      h += '<tr><td class="tm">'+o.id+'</td><td style="color:var(--t2)">'+o.uid+'</td><td>'+o.name+'</td>';
      h += '<td style="color:var(--g);font-weight:700">$'+o.amt+'</td>';
      h += '<td>'+(o.coupon?badge(o.coupon,'bv'):'—')+'</td>';
      h += '<td style="color:var(--a)">$'+(o.pm||0)+'</td>';
      h += '<td class="tm">'+o.iccid+'</td><td class="tm">'+o.date+'</td><td>'+statusBadge(o.status)+'</td></tr>';
    });
    h += '</tbody></table><div style="padding:8px 16px;font-size:10px;color:var(--t3);border-top:1px solid var(--b1)">$'+total.toFixed(2)+' total</div></div>';
    return h;
  },

  // ── COUPONS ──
  pg_coupons: function() {
    var coupons = DB.getCoupons();
    var h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">';
    h += '<div><h2 style="font-family:var(--fn);font-size:20px;font-weight:800">Coupons</h2><p style="font-size:11px;color:var(--t3);margin-top:3px">Active coupons work immediately on checkout</p></div>';
    h += '<button class="btn btn-g btn-sm" data-action="open-coupon-modal" data-id="">+ Add Coupon</button></div>';
    h += '<div class="tw"><div class="th"><span class="tt">Coupon Codes</span></div>';
    h += '<table><thead><tr><th>Code</th><th>Discount</th><th>Description</th><th>Uses</th><th>Active</th><th>Actions</th></tr></thead><tbody>';
    Object.keys(coupons).forEach(function(code) {
      var c = coupons[code];
      h += '<tr>';
      h += '<td><code style="background:var(--gd);padding:2px 9px;border-radius:6px;font-size:11px;color:var(--g);letter-spacing:1px">'+code+'</code></td>';
      h += '<td style="color:var(--a);font-weight:700">'+c.pct+'% off</td>';
      h += '<td style="color:var(--t3)">'+(c.desc||'—')+'</td>';
      h += '<td style="color:#60A5FA">'+(c.uses||0)+'</td>';
      h += '<td><button class="tog '+(c.on?'on':'')+'\" data-action="toggle-coupon" data-id="'+code+'"></button></td>';
      h += '<td><div class="ta"><button class="btn btn-gl btn-xs" data-action="edit-coupon" data-id="'+code+'">✏️</button><button class="btn btn-red btn-xs" data-action="del-coupon" data-id="'+code+'">✕</button></div></td>';
      h += '</tr>';
    });
    h += '</tbody></table></div>';
    return h;
  },

  openCouponModal: function(code) {
    var c = code ? DB.getCoupons()[code] : null;
    var h = '<h2>'+(c?'Edit Coupon: '+code:'Add Coupon')+'</h2>';
    h += '<div class="f"><label>Code *</label><input id="cm-code" value="'+(code||'')+'" placeholder="SUMMER30" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>';
    h += '<div class="f"><label>Discount (%) *</label><input id="cm-pct" type="number" value="'+(c?c.pct:20)+'" min="1" max="99"></div>';
    h += '<div class="f"><label>Description</label><input id="cm-desc" value="'+(c&&c.desc?c.desc:'')+'" placeholder="Summer sale"></div>';
    h += '<div style="display:flex;align-items:center;gap:8px;margin:10px 0"><button id="cm-tg" class="tog '+(c&&c.on!==false?'on':'')+'\" onclick="this.classList.toggle(\'on\')"></button><span style="font-size:12px;font-weight:600">Active</span></div>';
    h += '<div class="fa"><button class="btn btn-gl" onclick="closeModal()">Cancel</button>';
    h += '<button class="btn btn-g" data-action="save-coupon" data-oldcode="'+(code||'')+'">💾 Save → Live</button></div>';
    openModal(h);
  },

  saveCoupon: function(oldCode) {
    var code = (document.getElementById('cm-code')||{}).value||'';
    var pct = parseInt((document.getElementById('cm-pct')||{}).value)||0;
    var desc = (document.getElementById('cm-desc')||{}).value||'';
    var on = document.getElementById('cm-tg') ? document.getElementById('cm-tg').classList.contains('on') : true;
    code = code.trim().toUpperCase();
    if(!code||!pct){ toast('Code and discount required','e'); return; }
    var uses = DB.getCoupons()[oldCode] ? DB.getCoupons()[oldCode].uses||0 : 0;
    if(oldCode && oldCode !== code) DB.delCoupon(oldCode);
    DB.saveCoupon(code, {pct:pct, on:on, desc:desc, uses:uses});
    closeModal(); Admin.go('coupons'); toast('Coupon '+code+' saved ✓');
  },

  // ── REVENUE ──
  pg_revenue: function() {
    var orders = DB.getOrders().slice().reverse();
    var total = orders.reduce(function(s,o){return s+o.amt;},0);
    var h = '<h2 style="font-family:var(--fn);font-size:20px;font-weight:800;margin-bottom:16px">Revenue</h2>';
    h += '<div class="mg">';
    h += '<div class="mc cg"><div class="ml">Total Revenue</div><div class="mv">$'+total.toFixed(2)+'</div></div>';
    h += '<div class="mc cb"><div class="ml">Orders</div><div class="mv">'+orders.length+'</div></div>';
    h += '<div class="mc ca"><div class="ml">Avg Order</div><div class="mv">$'+(orders.length?(total/orders.length).toFixed(2):'0.00')+'</div></div>';
    h += '<div class="mc cv"><div class="ml">Users</div><div class="mv">'+DB.getUsers().length+'</div></div></div>';
    h += '<div class="tw"><div class="th"><span class="tt">Transactions</span><button class="btn btn-gl btn-sm" onclick="DB.export()">📥 Export</button></div>';
    h += '<table><thead><tr><th>ID</th><th>User</th><th>Plan</th><th>Amount</th><th>Coupon</th><th>PM</th><th>Date</th></tr></thead><tbody>';
    orders.forEach(function(o) {
      h += '<tr><td class="tm">'+o.id+'</td><td style="color:var(--t2)">'+o.uid+'</td><td>'+o.name+'</td>';
      h += '<td style="color:var(--g);font-weight:700">$'+o.amt+'</td>';
      h += '<td>'+(o.coupon?badge(o.coupon,'bv'):'—')+'</td>';
      h += '<td style="color:var(--a)">$'+(o.pm||0)+'</td><td class="tm">'+o.date+'</td></tr>';
    });
    h += '</tbody></table></div>';
    return h;
  },

  // ── REGIONS ──
  pg_regions: function() {
    var plans = DB.getPlans(); var regions = {};
    plans.forEach(function(p){ if(!regions[p.region]) regions[p.region]=[]; regions[p.region].push(p); });
    var h = '<h2 style="font-family:var(--fn);font-size:20px;font-weight:800;margin-bottom:16px">Regions</h2>';
    h += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">';
    Object.keys(regions).forEach(function(r) {
      var ps = regions[r];
      h += '<div style="background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:16px">';
      h += '<div style="font-family:var(--fn);font-size:14px;font-weight:700;margin-bottom:6px">'+r+'</div>';
      h += '<div style="font-family:var(--fn);font-size:22px;font-weight:900;color:var(--g);margin-bottom:8px">'+ps.length+' plans</div>';
      h += '<div style="display:flex;flex-wrap:wrap;gap:3px">';
      ps.slice(0,10).forEach(function(p){ h+='<span style="background:var(--s3);border:1px solid var(--b2);border-radius:3px;padding:2px 6px;font-size:9px;color:var(--t2)">'+p.flag+' '+p.country+'</span>'; });
      if(ps.length>10) h+='<span style="font-size:9px;color:var(--t3)">+'+(ps.length-10)+'</span>';
      h += '</div></div>';
    });
    h += '</div>';
    return h;
  },

  // ── SETTINGS ──
  pg_settings: function() {
    var cfg = DB.getCfg();
    var h = '<h2 style="font-family:var(--fn);font-size:20px;font-weight:800;margin-bottom:16px">Settings</h2>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
    h += '<div style="background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:17px">';
    h += '<h3 style="font-family:var(--fn);font-size:13px;font-weight:700;margin-bottom:13px;padding-bottom:10px;border-bottom:1px solid var(--b1)">⚙️ Platform Toggles</h3>';
    var toggles = [{key:'reg',label:'User Registration',sub:'Allow new signups'},{key:'coupons',label:'Coupon System',sub:'Enable/disable all coupons'},{key:'loyalty',label:'PrimeMoney Loyalty',sub:'Cashback earning'},{key:'chatbot',label:'AI Chatbot',sub:'Claude AI support'},{key:'maintenance',label:'Maintenance Mode',sub:'Block all traffic'}];
    toggles.forEach(function(item) {
      h += '<div style="display:flex;align-items:center;gap:10px;padding:5px 0">';
      h += '<button class="tog '+(cfg[item.key]?'on':'')+'\" data-action="toggle-cfg" data-id="'+item.key+'"></button>';
      h += '<div><div style="font-size:12px;font-weight:600">'+item.label+'</div><div style="font-size:10px;color:var(--t3)">'+item.sub+'</div></div></div>';
    });
    h += '</div>';
    h += '<div>';
    h += '<div style="background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:17px;margin-bottom:12px">';
    h += '<h3 style="font-family:var(--fn);font-size:13px;font-weight:700;margin-bottom:12px">🗄️ Database</h3>';
    h += '<p style="font-size:11px;color:var(--t3);margin-bottom:12px">Shared localStorage key: <code style="background:var(--s3);padding:2px 6px;border-radius:4px;font-size:10px">ps5</code> — syncs with primesim.co on same browser.</p>';
    h += '<div style="display:flex;gap:7px;flex-wrap:wrap">';
    h += '<button class="btn btn-gl btn-sm" onclick="DB.export()">📥 Export JSON</button>';
    h += '<button class="btn btn-amb btn-sm" onclick="if(confirm(\'Reset to defaults?\'))Admin._doReset()">↻ Reset DB</button></div></div>';
    h += '<div style="background:var(--s1);border:1px solid var(--b1);border-radius:18px;padding:17px">';
    h += '<h3 style="font-family:var(--fn);font-size:13px;font-weight:700;margin-bottom:10px">💱 FX Rates (1 USD =)</h3>';
    h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;max-height:220px;overflow-y:auto">';
    Object.keys(cfg.fx).forEach(function(cur) {
      h += '<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 7px;background:var(--s3);border-radius:6px">';
      h += '<span style="font-size:11px;font-weight:700;color:var(--t2)">'+cur+'</span>';
      h += '<input type="number" step="0.001" value="'+cfg.fx[cur]+'" data-action="set-fx" data-id="'+cur+'" style="width:68px;background:none;border:none;text-align:right;font-size:11px;color:var(--a);outline:none;font-family:monospace">';
      h += '</div>';
    });
    h += '</div></div></div></div>';
    return h;
  },

  _doReset: function() { DB.reset(); Admin.go('settings'); },

  // ── PREVIEW ──
  pg_preview: function() {
    var s = DB.stats(); var plans = DB.getPlans({on:true}).slice(0,6);
    var h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">';
    h += '<div><h2 style="font-family:var(--fn);font-size:20px;font-weight:800">Live Preview</h2><p style="font-size:11px;color:var(--g);margin-top:3px">Exactly what primesim.co visitors see</p></div></div>';
    h += '<div style="background:var(--s1);border:3px solid var(--g);border-radius:18px;padding:18px">';
    h += '<div class="al al-g" style="margin-bottom:14px">✓ LIVE — '+s.active+' plans visible on primesim.co right now</div>';
    h += '<div class="pg">';
    plans.forEach(function(p) {
      h += '<div class="pc'+(p.feat?' ft':'')+'" style="cursor:default">';
      h += '<div style="font-size:28px;margin-bottom:9px;line-height:1">'+p.flag+'</div>';
      h += '<div style="font-family:var(--fn);font-size:14px;font-weight:700;margin-bottom:2px">'+p.country+'</div>';
      h += '<div style="font-size:10px;color:var(--t3);margin-bottom:9px">'+p.provider+'</div>';
      h += '<div style="font-family:var(--fn);font-size:20px;font-weight:800">$'+p.rt+'<sub style="font-size:10px;font-weight:400;color:var(--t3)">USD</sub></div></div>';
    });
    h += '</div></div>';
    return h;
  }
};

// ====================================================
// EVENT DELEGATION
// ====================================================
document.addEventListener('click', function(e) {
  var el = e.target.closest('[data-action]');
  if(!el) return;
  var action = el.dataset.action;
  var id = el.dataset.id || '';

  switch(action) {
    case 'toggle-feat':
      DB.togglePlan(id, 'feat');
      var fn1 = Admin['pg_'+Admin._page];
      if(fn1) { var c1=document.getElementById('adm-content'); if(c1) c1.innerHTML=fn1(); }
      toast('Featured toggled ✓');
      break;
    case 'toggle-on':
      var newVal = DB.togglePlan(id, 'on');
      var fn2 = Admin['pg_'+Admin._page];
      if(fn2) { var c2=document.getElementById('adm-content'); if(c2) c2.innerHTML=fn2(); }
      toast('Plan '+(newVal?'activated':'deactivated')+' ✓');
      break;
    case 'edit-plan':
      Admin.openPlanModal(id||null);
      break;
    case 'open-plan-modal':
      Admin.openPlanModal(null);
      break;
    case 'dup-plan':
      var d=DB.get(); var p=d.plans.find(function(x){return x.id===id;}); if(!p) break;
      var copy=JSON.parse(JSON.stringify(p)); copy.id='P'+Date.now().toString().slice(-7); copy.country+=' (copy)'; copy.sales=0;
      d.plans.push(copy); DB.save(d); Admin.go('plans'); toast('Duplicated ✓');
      break;
    case 'del-plan':
      var name = el.dataset.name||id;
      if(confirm('Delete plan: '+name+'?')){ DB.delPlan(id); Admin.go('plans'); toast('Plan deleted ✓'); }
      break;
    case 'save-plan':
      Admin.savePlan(id);
      break;
    case 'toggle-user':
      DB.toggleUser(id); Admin.go('users'); toast('User status toggled ✓');
      break;
    case 'edit-user':
      Admin.openUserModal(id||null);
      break;
    case 'open-user-modal':
      Admin.openUserModal(null);
      break;
    case 'del-user':
      var uname = el.dataset.name||id;
      if(confirm('Delete user: '+uname+'?')){ DB.delUser(id); Admin.go('users'); toast('User deleted ✓'); }
      break;
    case 'save-user':
      Admin.saveUser(id);
      break;
    case 'toggle-coupon':
      DB.toggleCoupon(id); Admin.go('coupons'); toast('Coupon toggled ✓');
      break;
    case 'edit-coupon':
      Admin.openCouponModal(id||null);
      break;
    case 'open-coupon-modal':
      Admin.openCouponModal(null);
      break;
    case 'del-coupon':
      if(confirm('Delete coupon: '+id+'?')){ DB.delCoupon(id); Admin.go('coupons'); toast('Coupon deleted ✓'); }
      break;
    case 'save-coupon':
      Admin.saveCoupon(el.dataset.oldcode||'');
      break;
    case 'toggle-cfg':
      var curVal = DB.getCfg()[id];
      DB.setCfg(id, !curVal);
      var fn3=Admin['pg_settings']; if(fn3){var c3=document.getElementById('adm-content');if(c3)c3.innerHTML=fn3();}
      toast(id+' '+(curVal?'disabled':'enabled')+' ✓');
      break;
    case 'do-bulk-import':
      Admin.doBulkImport();
      break;
  }
});

// FX rate onchange
document.addEventListener('change', function(e) {
  var el = e.target;
  if(el.dataset.action === 'set-fx') {
    DB.setFX(el.dataset.id, parseFloat(el.value)||1);
    toast(el.dataset.id+' rate updated ✓');
  }
});

// ====================================================
// INIT
// ====================================================
document.addEventListener('DOMContentLoaded', function() {
  DB.init();
  Admin.init();
});
</script>
